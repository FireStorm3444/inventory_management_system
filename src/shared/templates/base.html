<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IMS Platform{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
    <script src="{{ url_for('static', path='js/htmx.min.js') }}" defer></script>
    <script src="{{ url_for('static', path='js/alpine.min.js') }}" defer></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex" 
      x-data="{ sidebarOpen: true, notifications: [] }">

    <aside class="w-64 bg-slate-950 border-r border-slate-800 p-4 flex flex-col justify-between"
           x-show="sidebarOpen">
        <div>
            <div class="font-bold text-xl tracking-wider text-indigo-400 mb-8">⚡ IMS ENTERPRISE</div>
            <nav class="space-y-2">
                <a href="/" class="block px-3 py-2 rounded hover:bg-slate-800 transition">📊 Dashboard</a>
                <a href="/catalog" class="block px-3 py-2 rounded hover:bg-slate-800 transition">📦 Catalog & SKUs</a>
                <a href="/inventory" class="block px-3 py-2 rounded hover:bg-slate-800 transition">🔄 Stock / Restock</a>
                <a href="/invoices" class="block px-3 py-2 rounded hover:bg-slate-800 transition">🧾 POS Invoices</a>
            </nav>
        </div>
        <div class="text-xs text-slate-500 border-t border-slate-800 pt-4">
            Python 3.14 • FastAPI • HTMX
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-16 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-900/50 backdrop-blur">
            <button @click="sidebarOpen = !sidebarOpen" class="text-slate-400 hover:text-white">
                ☰ Toggle Menu
            </button>
            <div class="flex items-center space-x-4">
                <span class="text-sm font-medium px-2.5 py-1 bg-emerald-950 text-emerald-400 border border-emerald-800 rounded-full">
                    Tenant: Default Store
                </span>
            </div>
        </header>

        <div id="main-viewport" class="p-6 flex-1 overflow-y-auto">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
